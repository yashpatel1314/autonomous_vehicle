# ──────────────────────────────────────────────────────────────────────────────
# av_sim docker-compose
#
# Services:
#   sim          — Gazebo physics (headless) + RViz2 visualization  ← USE THIS
#   sim-headless — Gazebo physics only, no display  (CI / cloud / no monitor)
#   test         — Run the pytest suite
#
# Quick start (Windows WSL2 — run from your Ubuntu WSL2 terminal):
#   docker compose up sim
#
#   Gazebo runs headless (server only) — no flickering GUI.
#   RViz2 opens as a native window via WSLg and shows the maze, robot, and path.
#
# CI / headless:
#   docker compose up sim-headless
# ──────────────────────────────────────────────────────────────────────────────

x-common: &common
  build: .
  image: av_sim:latest
  network_mode: host

x-display-env: &display-env
  DISPLAY: ${DISPLAY:-:0}
  QT_X11_NO_MITSHM: "1"
  QT_QPA_PLATFORM: xcb
  LIBGL_ALWAYS_SOFTWARE: "1"
  MESA_GL_VERSION_OVERRIDE: "3.3"
  MESA_GLSL_VERSION_OVERRIDE: "330"
  XDG_RUNTIME_DIR: /tmp/runtime

services:

  # ── Primary service: headless Gazebo + RViz2 ─────────────────────────────
  # Gazebo runs as a physics server (no GUI window = no Mesa rendering issues).
  # RViz2 is the visualization: shows the maze, robot, planned path, and
  # checkpoint markers in a stable top-down 2D view.
  sim:
    <<: *common
    environment:
      <<: *display-env
    volumes:
      - /mnt/wslg/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c "
        mkdir -p /tmp/runtime && chmod 700 /tmp/runtime &&
        ros2 launch av_sim sim.launch.py
      "

  # ── CI / no-display: physics only, no visualization ───────────────────────
  sim-headless:
    <<: *common
    environment:
      LIBGL_ALWAYS_SOFTWARE: "1"
    command: ros2 launch av_sim sim.launch.py no_rviz:=true

  # ── Test suite ─────────────────────────────────────────────────────────────
  test:
    <<: *common
    environment:
      LIBGL_ALWAYS_SOFTWARE: "1"
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /ws/install/setup.bash &&
        colcon test --packages-select av_sim --event-handlers console_direct+ &&
        colcon test-result --all --verbose
      "
